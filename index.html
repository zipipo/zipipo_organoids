<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organoid Pro Logbook</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #F8FAFC; --surface: #FFFFFF; --primary: #3B82F6; --primary-soft: #EFF6FF;
            --text-main: #1E293B; --text-sub: #64748B; --border: #E2E8F0;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.6rem; font-weight: 700; margin: 0; color: #0F172A; }
        
        .btn { font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 6px; padding: 10px 16px; border: none; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2563EB; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-sub); }
        .btn-outline:hover { background: var(--bg); }

        .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; background: #F8FAFC; font-size: 1.05rem; }

        /* 입력 폼 셋팅 */
        .entry-form { padding: 20px; background: var(--primary-soft); display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid #BFDBFE; }
        .form-row { display: grid; gap: 16px; align-items: end; }
        .row-1 { grid-template-columns: 1fr 1.5fr 1.5fr; }
        .row-2 { grid-template-columns: 1.2fr 0.8fr 0.8fr 2.5fr 100px; } /* 작업내용, 최종Well, Stock, Memo, 버튼 */
        
        label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        #previewArea { padding: 15px 20px; font-size: 0.9rem; color: var(--primary); font-weight: 500; background: #FFFFFF; }

        /* 타임라인 그룹화 UI */
        .timeline-section { margin-bottom: 30px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .timeline-header { background: #E0F2FE; padding: 12px 20px; font-weight: 700; color: #0369A1; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #BAE6FD; }
        .timeline-header span.current-status { font-size: 0.85rem; background: white; padding: 4px 10px; border-radius: 20px; color: #0284C7; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; text-align: left; background: white; }
        th { padding: 12px 20px; background: #F8FAFC; color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; }
        tr:hover { background-color: #F8FAFC; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .badge-blue { background: #DBEAFE; color: #1E40AF; }
        .badge-orange { background: #FFEDD5; color: #9A3412; }
        .badge-green { background: #D1FAE5; color: #065F46; }

        .memo-cell { max-width: 200px; color: #334155; line-height: 1.4; word-break: break-all; font-size: 0.9rem; }
        .data-cell { font-weight: 600; color: #0F172A; }
        .highlight-well { color: #059669; font-weight: 700; font-size: 1.05rem; } /* 최종 Well 강조 */

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 550px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .line-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); background: #F8FAFC; margin-bottom: 8px; border-radius: 6px; align-items: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🔬 Organoid Pro Logbook</h1>
            <div style="display:flex; gap:12px;">
                <button class="btn btn-outline" onclick="openLineModal()">⚙️ 마스터 라인 관리</button>
                <button class="btn btn-outline" onclick="exportToCSV()">💾 CSV 데이터 백업</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📝 데일리 작업 일지 기록</div>
            <div class="entry-form">
                <div class="form-row row-1">
                    <div><label>작업 날짜</label><input type="date" id="logDate"></div>
                    <div><label>라인 선택</label>
                        <select id="lineSelect" onchange="previewDay()">
                            <option value="">-- 라인 선택 --</option>
                        </select>
                    </div>
                    <div><label>수행 액션</label>
                        <select id="logAction">
                            <option value="Media Change">Media Change (단순 교환)</option>
                            <option value="Split">Split (P+1, d0 리셋)</option>
                            <option value="Reseeding">Reseeding (P유지, d누적+0)</option>
                            <option value="Observation">Observation (관찰/기타)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row row-2">
                    <div><label>과정 (예: 1:4 split)</label><input type="text" id="logDetails" placeholder="비율 등"></div>
                    <div><label style="color:#059669;">최종 Well 수</label><input type="number" id="logFinalWells" placeholder="현재 총 개수" min="0"></div>
                    <div><label>Stocks 생성</label><input type="number" id="logStocks" placeholder="바이알 수" min="0"></div>
                    <div><label>디테일 메모</label><input type="text" id="logMemo" placeholder="특이사항, 시약 등 입력"></div>
                    <button class="btn btn-primary" style="height: 42px;" onclick="addDailyLog()">+ 기록</button>
                </div>
            </div>
            <div id="previewArea">라인을 선택하면 현재 P/D 상태가 표시됩니다.</div>
        </div>

        <h2 style="font-size: 1.2rem; color: #1E293B; margin-bottom: 15px;">📅 라인별 전체 배양 타임라인</h2>
        <div id="groupedTimelineContainer">
            </div>
    </div>

    <div id="lineModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#0F172A;">마스터 라인 등록</h2>
            <div style="background: var(--primary-soft); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:12px; margin-bottom:12px;">
                    <div><label>환자 번호</label><input type="text" id="newLineId" placeholder="예: HCC22"></div>
                    <div><label>종류</label>
                        <select id="newLineType">
                            <option value="PHH-org">PHH-org</option>
                            <option value="Tumor-org">Tumor-org</option>
                            <option value="Chol-org">Chol-org</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <div><label>현재 P (계대수)</label><input type="number" id="newLineP" placeholder="P 번호" min="0"></div>
                    <div><label style="color:#D97706;">d0 기준 시작일 (매우 중요!)</label><input type="date" id="newLineStartDate"></div>
                </div>
                <button class="btn btn-primary" style="width:100%;" onclick="registerNewLine()">신규 라인 등록</button>
            </div>
            <div id="activeLines" style="max-height: 200px; overflow-y: auto;"></div>
            <button class="btn btn-outline" style="width:100%; margin-top:20px;" onclick="closeModal()">닫기</button>
        </div>
    </div>

<script>
    // 날짜 기본값 세팅
    document.getElementById('logDate').valueAsDate = new Date();
    document.getElementById('newLineStartDate').valueAsDate = new Date();

    let lines = JSON.parse(localStorage.getItem('orgLinesProV2')) || [];
    let logs = JSON.parse(localStorage.getItem('orgDailyLogsProV2')) || [];

    // 날짜 계산 함수
    function calcDDay(line, targetDate = new Date()) {
        const start = new Date(line.startDate);
        const target = new Date(targetDate);
        start.setHours(0,0,0,0); target.setHours(0,0,0,0);
        const diff = Math.floor((target - start) / (1000 * 60 * 60 * 24));
        return line.baseDay === 0 ? `d${diff}` : `d${line.baseDay}+${diff}`;
    }

    function getBadgeColor(action) {
        if(action.includes('Media')) return 'badge-blue';
        if(action.includes('Split')) return 'badge-orange';
        if(action.includes('Reseed')) return 'badge-green';
        return '';
    }

    // 메인 UI 렌더링
    function updateUI() {
        // 1. 셀렉트 박스 업데이트
        const select = document.getElementById('lineSelect');
        select.innerHTML = '<option value="">-- 라인 선택 --</option>';
        lines.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.id; opt.innerText = `${l.patientId}_${l.type} (현재 P${l.passage})`;
            select.appendChild(opt);
        });

        // 2. 모달창 라인 목록 업데이트
        const lineList = document.getElementById('activeLines');
        lineList.innerHTML = '';
        lines.forEach((l, idx) => {
            lineList.innerHTML += `
                <div class="line-item">
                    <div>
                        <div style="font-weight:600;">${l.patientId}_${l.type}</div>
                        <div style="font-size:0.8rem; color:var(--text-sub);">P${l.passage} / 시작일: ${l.startDate.split('T')[0]}</div>
                    </div>
                    <button style="border:none; background:none; color:var(--danger); cursor:pointer; font-weight:600;" onclick="deleteLine(${idx})">삭제</button>
                </div>`;
        });

        // 3. 타임라인 그룹화 렌더링 (핵심 수정 부분!)
        const timelineContainer = document.getElementById('groupedTimelineContainer');
        timelineContainer.innerHTML = '';

        if(lines.length === 0) {
            timelineContainer.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-sub);">등록된 라인이 없습니다. 마스터 라인을 먼저 등록해주세요.</div>';
        }

        lines.forEach(line => {
            // 이 라인에 해당하는 로그만 필터링 후 최신순 정렬
            const lineLogs = logs.filter(log => log.lineId === line.id).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            let html = `
            <div class="timeline-section">
                <div class="timeline-header">
                    <span>🧬 ${line.patientId}_${line.type}</span>
                    <span class="current-status">현재 상태: P${line.passage} / ${calcDDay(line)}</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 12%;">Date</th>
                            <th style="width: 15%;">Action</th>
                            <th style="width: 12%;">P/D Status</th>
                            <th style="width: 15%;">과정 (Ratio)</th>
                            <th style="width: 10%;">최종 Well</th>
                            <th style="width: 8%;">Stock</th>
                            <th style="width: 20%;">Memo</th>
                            <th style="width: 8%; text-align:center;">Del</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if(lineLogs.length === 0) {
                html += `<tr><td colspan="8" style="text-align:center; color:var(--text-sub); padding:20px;">아직 기록된 일지가 없습니다.</td></tr>`;
            } else {
                lineLogs.forEach(log => {
                    html += `
                    <tr>
                        <td style="color:var(--text-sub); font-size:0.9rem;">${log.date}</td>
                        <td><span class="badge ${getBadgeColor(log.action)}">${log.action}</span></td>
                        <td class="data-cell" style="color:var(--primary);">P${log.passage} / ${log.dayInfo}</td>
                        <td>${log.details || '-'}</td>
                        <td class="highlight-well">${log.finalWells ? log.finalWells + '개' : '-'}</td>
                        <td style="color:#0284C7; font-weight:600;">${log.stocks ? log.stocks + '개' : '-'}</td>
                        <td class="memo-cell">${log.memo || '-'}</td>
                        <td style="text-align:center;"><button onclick="deleteLog('${log.id}')" style="border:none; background:none; cursor:pointer; font-size:1.1rem;">🗑️</button></td>
                    </tr>`;
                });
            }

            html += `</tbody></table></div>`;
            timelineContainer.innerHTML += html;
        });

        localStorage.setItem('orgLinesProV2', JSON.stringify(lines));
        localStorage.setItem('orgDailyLogsProV2', JSON.stringify(logs));
    }

    // 마스터 라인 등록 (d0 시작일 포함)
    function registerNewLine() {
        const pId = document.getElementById('newLineId').value.trim();
        const type = document.getElementById('newLineType').value;
        const p = document.getElementById('newLineP').value || 0;
        const startDate = document.getElementById('newLineStartDate').value;
        
        if(!pId) return alert("환자 번호를 입력하세요.");
        if(!startDate) return alert("d0 기준 시작일을 지정해주세요.");
        
        lines.push({
            id: Date.now().toString(), 
            patientId: pId, 
            type: type, 
            passage: parseInt(p),
            baseDay: 0, 
            startDate: new Date(startDate).toISOString() // 지정한 날짜 저장
        });
        updateUI(); 
        document.getElementById('newLineId').value = '';
        closeModal();
    }

    // 일지 등록 (최종 Well 분리)
    function addDailyLog() {
        const lineId = document.getElementById('lineSelect').value;
        const action = document.getElementById('logAction').value;
        const dateVal = document.getElementById('logDate').value;
        const details = document.getElementById('logDetails').value.trim();
        const finalWells = document.getElementById('logFinalWells').value;
        const stocks = document.getElementById('logStocks').value;
        const memo = document.getElementById('logMemo').value.trim();

        if(!lineId) return alert("먼저 기록할 라인을 선택하세요.");

        const lineIdx = lines.findIndex(l => l.id === lineId);
        const line = lines[lineIdx];
        const currentD = calcDDay(line, dateVal);

        const logEntry = {
            id: Date.now().toString(),
            lineId: line.id, // 라인 ID로 연결
            lineDisplay: `${line.patientId}_${line.type}`, 
            date: dateVal, 
            action: action,
            passage: line.passage, 
            dayInfo: currentD, 
            details: details,
            finalWells: finalWells, 
            stocks: stocks, 
            memo: memo
        };

        // 스마트 액션: Split과 Reseeding 시 마스터 날짜 업데이트
        if(action === 'Split') {
            line.passage += 1; line.baseDay = 0; line.startDate = new Date(dateVal).toISOString();
        } else if(action === 'Reseeding') {
            const diff = Math.floor((new Date(dateVal) - new Date(line.startDate)) / (1000 * 60 * 60 * 24));
            line.baseDay += diff; line.startDate = new Date(dateVal).toISOString();
        }

        logs.push(logEntry); updateUI();
        
        // 폼 초기화 (연속 입력을 위해 일부 유지)
        document.getElementById('logDetails').value = '';
        document.getElementById('logFinalWells').value = '';
        document.getElementById('logStocks').value = '';
        document.getElementById('logMemo').value = '';
        previewDay();
    }

    function previewDay() {
        const lineId = document.getElementById('lineSelect').value;
        const preview = document.getElementById('previewArea');
        if(!lineId) { preview.innerHTML = '라인을 선택하면 현재 P/D 상태가 표시됩니다.'; return; }
        const line = lines.find(l => l.id === lineId);
        preview.innerHTML = `💡 현재 이 라인은 <strong>P${line.passage} / ${calcDDay(line)}</strong> 상태입니다. 추가 시점에 이 수치가 박제됩니다.`;
    }

    function openLineModal() { document.getElementById('lineModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('lineModal').style.display = 'none'; }
    function deleteLine(idx) { if(confirm("마스터 라인을 삭제하시겠습니까? (관련 로그는 사라지지 않지만 연결이 끊어집니다)")) { lines.splice(idx, 1); updateUI(); } }
    function deleteLog(logId) { 
        if(confirm("기록을 삭제하시겠습니까?")) { 
            logs = logs.filter(l => l.id !== logId); 
            updateUI(); 
        } 
    }

    function exportToCSV() {
        let csv = "\uFEFFDate,Line,Action,P,D,Details(Ratio),Final Wells,Stocks,Memo\n";
        logs.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(l => {
            const safeMemo = (l.memo||'').replace(/"/g, '""');
            csv += `${l.date},${l.lineDisplay},${l.action},P${l.passage},${l.dayInfo},"${l.details||''}",${l.finalWells||''},${l.stocks||''},"${safeMemo}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Organoid_Pro_Grouped_Log.csv`; link.click();
    }

    updateUI();
</script>
</body>
</html>

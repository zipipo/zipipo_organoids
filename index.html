<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오가노이드 실험 노트</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-body: #F3F4F6;
            --bg-surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --danger: #EF4444;
            --danger-hover: #DC2828;
            
            /* 뱃지 색상 */
            --badge-media-bg: #DBEAFE;
            --badge-media-text: #1E40AF;
            --badge-split-bg: #FEF3C7;
            --badge-split-text: #92400E;
            --badge-reseed-bg: #D1FAE5;
            --badge-reseed-text: #065F46;
            --badge-obs-bg: #F3E8FF;
            --badge-obs-text: #6B21A8;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        button {
            font-family: inherit;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        button:hover { background-color: var(--primary-hover); }

        .btn-delete {
            background-color: transparent;
            color: var(--text-muted);
            box-shadow: none;
            padding: 6px 10px;
        }
        
        .btn-delete:hover {
            background-color: #FEE2E2;
            color: var(--danger);
        }

        /* 테이블 래퍼 (카드 스타일) */
        .table-card {
            background-color: var(--bg-surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #F9FAFB;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }
        
        tr.log-row:hover { background-color: #F8FAFC; }

        /* 입력 필드 디자인 */
        .input-row {
            background-color: #EFF6FF; /* 아주 연한 파란색 배경으로 입력창 강조 */
            border-bottom: 2px solid #BFDBFE;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            background-color: white;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .memo-cell {
            color: var(--text-muted);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 트렌디한 뱃지 디자인 */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .badge.media { background-color: var(--badge-media-bg); color: var(--badge-media-text); }
        .badge.split { background-color: var(--badge-split-bg); color: var(--badge-split-text); }
        .badge.reseed { background-color: var(--badge-reseed-bg); color: var(--badge-reseed-text); }
        .badge.obs { background-color: var(--badge-obs-bg); color: var(--badge-obs-text); }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>🔬 Organoid Logbook</h1>
                <p>매일의 배양 상태와 작업 내역을 기록하세요.</p>
            </div>
            <button onclick="exportToCSV()">↓ CSV 다운로드</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th style="width: 12%;">Date</th>
                        <th style="width: 15%;">Line ID</th>
                        <th style="width: 14%;">Action</th>
                        <th style="width: 8%;">P (계대)</th>
                        <th style="width: 10%;">D (배양일)</th>
                        <th style="width: 8%;">Wells</th>
                        <th style="width: 25%;">Memo</th>
                        <th style="width: 8%; text-align: center;">Manage</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr class="input-row">
                        <td><input type="date" id="inDate"></td>
                        <td><input type="text" id="inLine" placeholder="예: HCC22_PHH"></td>
                        <td>
                            <select id="inAction">
                                <option value="Media Change">Media Change</option>
                                <option value="Split">Split</option>
                                <option value="Reseeding">Reseeding</option>
                                <option value="Observation">Observation</option>
                            </select>
                        </td>
                        <td><input type="number" id="inPassage" placeholder="P" min="0"></td>
                        <td><input type="text" id="inDay" placeholder="예: 0, 12+1"></td>
                        <td><input type="number" id="inWells" placeholder="개수" min="0"></td>
                        <td><input type="text" id="inMemo" placeholder="특이사항 입력..."></td>
                        <td style="text-align: center;">
                            <button onclick="addLog()" style="padding: 10px 14px;">+ 추가</button>
                        </td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>

<script>
    document.getElementById('inDate').valueAsDate = new Date();

    let logs = JSON.parse(localStorage.getItem('organoidLogs')) || [];

    function getBadgeClass(action) {
        if(action.includes('Media')) return 'badge media';
        if(action.includes('Split')) return 'badge split';
        if(action.includes('Reseed')) return 'badge reseed';
        return 'badge obs';
    }

    function renderLogs() {
        const tbody = document.getElementById('logBody');
        while (tbody.children.length > 1) {
            tbody.removeChild(tbody.lastChild);
        }

        const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));

        sortedLogs.forEach((log) => {
            const tr = document.createElement('tr');
            tr.className = 'log-row';
            tr.innerHTML = `
                <td style="color: var(--text-muted); font-size: 0.9rem;">${log.date}</td>
                <td style="font-weight: 600;">${log.line}</td>
                <td><span class="${getBadgeClass(log.action)}">${log.action}</span></td>
                <td style="font-weight: 500;">P${log.passage}</td>
                <td style="font-weight: 500;">d${log.day}</td>
                <td>${log.wells}</td>
                <td class="memo-cell" title="${log.memo}">${log.memo || '-'}</td>
                <td style="text-align: center;"><button class="btn-delete" onclick="deleteLog('${log.id}')">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function addLog() {
        const date = document.getElementById('inDate').value;
        const line = document.getElementById('inLine').value.trim();
        const action = document.getElementById('inAction').value;
        const passage = document.getElementById('inPassage').value;
        const day = document.getElementById('inDay').value;
        const wells = document.getElementById('inWells').value;
        const memo = document.getElementById('inMemo').value.trim();

        if (!line) {
            alert('라인 이름(예: HCC22_PHH)을 입력해주세요!');
            return;
        }

        const newLog = {
            id: Date.now().toString(),
            date: date,
            line: line,
            action: action,
            passage: passage || "0",
            day: day || "0",
            wells: wells || "1",
            memo: memo
        };

        logs.push(newLog);
        localStorage.setItem('organoidLogs', JSON.stringify(logs));
        
        document.getElementById('inMemo').value = "";
        renderLogs();
    }

    function deleteLog(id) {
        if(confirm('이 기록을 삭제하시겠습니까?')) {
            logs = logs.filter(log => log.id !== id);
            localStorage.setItem('organoidLogs', JSON.stringify(logs));
            renderLogs();
        }
    }

    function exportToCSV() {
        if(logs.length === 0) {
            alert("저장된 데이터가 없습니다.");
            return;
        }
        
        let csvContent = "\uFEFF"; 
        csvContent += "Date,Line ID,Action,Passage(P),Day(D),Wells,Memo\n";

        const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        sortedLogs.forEach(row => {
            let safeMemo = row.memo.replace(/"/g, '""');
            if(safeMemo.includes(',')) safeMemo = `"${safeMemo}"`;
            let rowStr = `${row.date},${row.line},${row.action},P${row.passage},d${row.day},${row.wells},${safeMemo}`;
            csvContent += rowStr + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Organoid_Log_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    renderLogs();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organoid Pro Logbook</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #3B82F6;
            --primary-soft: #EFF6FF;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.6rem; font-weight: 700; margin: 0; color: #0F172A; }
        
        .btn {
            font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 6px;
            padding: 10px 16px; border: none; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2563EB; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-sub); }
        .btn-outline:hover { background: var(--bg); }

        .card {
            background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 24px;
        }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; background: #F8FAFC; font-size: 1.05rem; }

        /* 입력 폼 - 2줄 레이아웃으로 넓게 사용 */
        .entry-form { padding: 20px; background: var(--primary-soft); display: flex; flex-direction: column; gap: 16px; }
        .form-row { display: grid; gap: 16px; align-items: end; }
        .row-1 { grid-template-columns: 1fr 1.5fr 1.5fr; } /* 날짜, 라인, 액션 */
        .row-2 { grid-template-columns: 1fr 0.8fr 3fr 100px; } /* Wells, Stocks, Memo, 버튼 */
        
        label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 6px; font-weight: 600; }
        input, select { 
            width: 100%; padding: 10px 12px; border: 1px solid #CBD5E1; border-radius: 6px; 
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        #previewArea { padding: 0 20px 15px; font-size: 0.9rem; color: var(--primary); font-weight: 500; background: var(--primary-soft); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 14px 20px; background: #F8FAFC; color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; }
        tr:hover { background-color: #F8FAFC; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .badge-blue { background: #DBEAFE; color: #1E40AF; }
        .badge-orange { background: #FFEDD5; color: #9A3412; }
        .badge-green { background: #D1FAE5; color: #065F46; }

        /* 메모 텍스트 줄바꿈 및 너비 확보 */
        .memo-cell { max-width: 250px; color: #334155; line-height: 1.4; word-break: break-all; }
        .data-cell { font-weight: 500; color: #0F172A; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .line-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); background: #F8FAFC; margin-bottom: 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🔬 Organoid Pro Logbook</h1>
            <div style="display:flex; gap:12px;">
                <button class="btn btn-outline" onclick="openLineModal()">⚙️ 마스터 라인 관리</button>
                <button class="btn btn-outline" onclick="exportToCSV()">💾 CSV 데이터 백업</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📝 작업 일지 기록</div>
            <div class="entry-form">
                <div class="form-row row-1">
                    <div><label>Date</label><input type="date" id="logDate"></div>
                    <div><label>Line Select (자동 날짜 계산)</label>
                        <select id="lineSelect" onchange="previewDay()">
                            <option value="">-- 라인 선택 --</option>
                        </select>
                    </div>
                    <div><label>Action</label>
                        <select id="logAction">
                            <option value="Media Change">Media Change (단순 교환)</option>
                            <option value="Split">Split (P+1, d0 리셋)</option>
                            <option value="Reseeding">Reseeding (P유지, d누적+0)</option>
                            <option value="Observation">Observation (관찰/기타)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row row-2">
                    <div><label>Wells / Ratio (텍스트)</label><input type="text" id="logWells" placeholder="예: 4 -> 2 wells, 1:4"></div>
                    <div><label>Stocks (바이알)</label><input type="number" id="logStocks" placeholder="개수" min="0"></div>
                    <div><label>디테일 메모 (프로토콜, 상태, 사유 등)</label><input type="text" id="logMemo" placeholder="예: due to low density, No TrypLE 사용..."></div>
                    <button class="btn btn-primary" style="height: 42px;" onclick="addDailyLog()">+ 추가</button>
                </div>
            </div>
            <div id="previewArea"></div>
        </div>

        <div class="card">
            <div class="card-header">📅 전체 배양 타임라인</div>
            <div style="max-height: 600px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%;">Date</th>
                            <th style="width: 14%;">Line ID</th>
                            <th style="width: 12%;">Action</th>
                            <th style="width: 12%;">P/D Status</th>
                            <th style="width: 14%;">Wells / Stocks</th>
                            <th style="width: 30%;">Memo & Details</th>
                            <th style="width: 8%; text-align:center;">Manage</th>
                        </tr>
                    </thead>
                    <tbody id="logList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="lineModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#0F172A;">마스터 라인 등록</h2>
            <p style="font-size:0.9rem; color:var(--text-sub); margin-bottom:20px;">현재 인큐베이터에 있는 오가노이드의 시작점을 등록해두면 일지 작성 시 날짜가 자동 계산됩니다.</p>
            <div style="background: var(--primary-soft); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:12px; margin-bottom:12px;">
                    <input type="text" id="newLineId" placeholder="환자 번호 (예: HCC22)">
                    <select id="newLineType">
                        <option value="PHH-org">PHH-org</option>
                        <option value="Tumor-org">Tumor-org</option>
                        <option value="Chol-org">Chol-org</option>
                    </select>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <input type="number" id="newLineP" placeholder="현재 계대(P) 번호" min="0">
                    <button class="btn btn-primary" onclick="registerNewLine()">신규 라인 등록</button>
                </div>
            </div>
            <div id="activeLines" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn btn-outline" style="width:100%; margin-top:20px;" onclick="closeModal()">닫기</button>
        </div>
    </div>

<script>
    let lines = JSON.parse(localStorage.getItem('orgLinesPro')) || [];
    let logs = JSON.parse(localStorage.getItem('orgDailyLogsPro')) || [];

    document.getElementById('logDate').valueAsDate = new Date();

    function calcDDay(line, targetDate = new Date()) {
        const start = new Date(line.startDate);
        const target = new Date(targetDate);
        start.setHours(0,0,0,0); target.setHours(0,0,0,0);
        const diff = Math.floor((target - start) / (1000 * 60 * 60 * 24));
        return line.baseDay === 0 ? `d${diff}` : `d${line.baseDay}+${diff}`;
    }

    function updateUI() {
        const select = document.getElementById('lineSelect');
        select.innerHTML = '<option value="">-- 라인 선택 --</option>';
        lines.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.id; opt.innerText = `${l.patientId}_${l.type} (현재 P${l.passage})`;
            select.appendChild(opt);
        });

        const lineList = document.getElementById('activeLines');
        lineList.innerHTML = '';
        lines.forEach((l, idx) => {
            lineList.innerHTML += `
                <div class="line-item">
                    <span style="font-weight:600;">${l.patientId}_${l.type} <span style="color:var(--text-sub); font-weight:400;">(P${l.passage})</span></span>
                    <button style="border:none; background:none; color:var(--danger); cursor:pointer; font-weight:600;" onclick="deleteLine(${idx})">삭제</button>
                </div>`;
        });

        const logBody = document.getElementById('logList');
        logBody.innerHTML = '';
        [...logs].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((log, idx) => {
            const stockStr = log.stocks ? `<br><span style="color:#0284C7; font-size:0.85rem;">❄️ ${log.stocks} stocks</span>` : '';
            logBody.innerHTML += `
                <tr>
                    <td style="color:var(--text-sub); font-size:0.9rem;">${log.date}</td>
                    <td class="data-cell">${log.lineDisplay}</td>
                    <td><span class="badge ${getBadgeColor(log.action)}">${log.action}</span></td>
                    <td class="data-cell" style="color:var(--primary);">P${log.passage} / ${log.dayInfo}</td>
                    <td class="data-cell">${log.wells || '-'}${stockStr}</td>
                    <td class="memo-cell">${log.memo || '-'}</td>
                    <td style="text-align:center;"><button onclick="deleteLog(${logs.length - 1 - idx})" style="border:none; background:none; cursor:pointer; font-size:1.1rem;">🗑️</button></td>
                </tr>`;
        });

        localStorage.setItem('orgLinesPro', JSON.stringify(lines));
        localStorage.setItem('orgDailyLogsPro', JSON.stringify(logs));
    }

    function getBadgeColor(action) {
        if(action.includes('Media')) return 'badge-blue';
        if(action.includes('Split')) return 'badge-orange';
        if(action.includes('Reseed')) return 'badge-green';
        return '';
    }

    function registerNewLine() {
        const pId = document.getElementById('newLineId').value.trim();
        const type = document.getElementById('newLineType').value;
        const p = document.getElementById('newLineP').value || 0;
        
        if(!pId) return alert("환자 번호를 입력하세요.");
        
        lines.push({
            id: Date.now().toString(), patientId: pId, type: type, passage: parseInt(p),
            baseDay: 0, startDate: new Date().toISOString()
        });
        updateUI(); document.getElementById('newLineId').value = '';
    }

    function addDailyLog() {
        const lineId = document.getElementById('lineSelect').value;
        const action = document.getElementById('logAction').value;
        const dateVal = document.getElementById('logDate').value;
        const wells = document.getElementById('logWells').value.trim();
        const stocks = document.getElementById('logStocks').value;
        const memo = document.getElementById('logMemo').value.trim();

        if(!lineId) return alert("먼저 기록할 라인을 선택하세요.");

        const lineIdx = lines.findIndex(l => l.id === lineId);
        const line = lines[lineIdx];
        const currentD = calcDDay(line, dateVal);

        const logEntry = {
            date: dateVal, lineDisplay: `${line.patientId}_${line.type}`, action: action,
            passage: line.passage, dayInfo: currentD, wells: wells, stocks: stocks, memo: memo
        };

        if(action === 'Split') {
            line.passage += 1; line.baseDay = 0; line.startDate = new Date(dateVal).toISOString();
        } else if(action === 'Reseeding') {
            const diff = Math.floor((new Date(dateVal) - new Date(line.startDate)) / (1000 * 60 * 60 * 24));
            line.baseDay += diff; line.startDate = new Date(dateVal).toISOString();
        }

        logs.push(logEntry); updateUI();
        document.getElementById('logWells').value = '';
        document.getElementById('logStocks').value = '';
        document.getElementById('logMemo').value = '';
        previewDay();
    }

    function previewDay() {
        const lineId = document.getElementById('lineSelect').value;
        const preview = document.getElementById('previewArea');
        if(!lineId) { preview.innerHTML = ''; return; }
        const line = lines.find(l => l.id === lineId);
        preview.innerHTML = `💡 현재 이 라인은 <strong>P${line.passage} / ${calcDDay(line)}</strong> 상태입니다. 기록을 추가하면 이 수치가 로그에 박제됩니다.`;
    }

    function openLineModal() { document.getElementById('lineModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('lineModal').style.display = 'none'; }
    function deleteLine(idx) { if(confirm("마스터 라인을 삭제하시겠습니까?")) { lines.splice(idx, 1); updateUI(); } }
    function deleteLog(idx) { if(confirm("기록을 삭제하시겠습니까?")) { logs.splice(idx,1); updateUI(); } }

    function exportToCSV() {
        let csv = "\uFEFFDate,Line,Action,P,D,Wells/Ratio,Stocks,Memo\n";
        logs.forEach(l => {
            const safeMemo = (l.memo||'').replace(/"/g, '""');
            csv += `${l.date},${l.lineDisplay},${l.action},P${l.passage},${l.dayInfo},"${l.wells||''}","${l.stocks||''}","${safeMemo}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Organoid_Pro_Log.csv`; link.click();
    }

    updateUI();
</script>
</body>
</html>
